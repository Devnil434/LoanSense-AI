version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loansense
      POSTGRES_PASSWORD: loansense
      POSTGRES_DB: loansense
    ports:
      - "5432:5432"
    volumes:
      - loansense_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loansense"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://loansense:loansense@db:5432/loansense
      JWT_SECRET_KEY: change-me-in-production
      ENVIRONMENT: production
      ML_MODEL_PATH: ../ml/models/loan_model.joblib
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  loansense_pgdata:
